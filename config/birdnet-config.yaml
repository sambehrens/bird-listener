# BirdNET-Go v0.6.x configuration
# Full reference: https://github.com/tphakala/birdnet-go/wiki/Configuration

birdnet:
  sensitivity: 1.0
  threshold: 0.75
  overlap: 1.5
  threads: 2           # Pi 3 has 4 cores; 2 leaves headroom for the OS
  locale: en
  latitude: 36.1183    # Tulsa, OK
  longitude: -95.9765  # Tulsa, OK

realtime:
  audio:
    source: "USB Audio"   # Sennheiser Profile — v0.6.4 matches by device name substring

  log:
    enabled: true
    path: logs/detections.log
    rotation: daily

webserver:
  enabled: true
  port: 8080
