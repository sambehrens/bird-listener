# BirdNET-Go nightly-20260414 configuration
# Full reference: https://github.com/tphakala/birdnet-go/wiki/Configuration

birdnet:
  sensitivity: 1.0
  threshold: 0.75
  overlap: 1.5
  threads: 2           # Pi 3 has 4 cores; 2 leaves headroom for the OS
  locale: en-us
  latitude: 36.1183    # Tulsa, OK
  longitude: -95.9765  # Tulsa, OK

models:
  enabled:
    - birdnet

realtime:
  audio:
    sources:
      - name: "Sound Card 1"
        device: "USB Audio"   # Sennheiser Profile ALSA capture device
        gain: 0
        models:
          - birdnet

  species:
    exclude:
      - "Eastern Screech-Owl"  # false-positives on sirens

  log:
    enabled: true
    path: logs/detections.log
    rotation: daily

webserver:
  enabled: true
  port: "8080"
